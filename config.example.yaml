# config.example.yaml — copy to config.yaml and customize
servers:
  # Example 1: Bearer token auth
  my-api:
    openapi_url: "http://my-api-host/openapi.json"
    base_url: "http://my-api-host"
    auth:
      type: bearer
      token: "your-bearer-token-here"

  # Example 2: API key header auth
  another-api:
    openapi_url: "http://another-api/openapi.json"
    base_url: "http://another-api"
    auth:
      type: api_key
      header: "X-API-Key"
      value: "your-api-key-here"

  # Example 3: HTTP Basic auth
  basic-api:
    openapi_url: "http://basic-api/openapi.json"
    base_url: "http://basic-api"
    auth:
      type: basic
      username: "your-username"
      password: "your-password"

  # Example 4: No auth (public API)
  public-api:
    openapi_url: "http://public-api/openapi.json"
    base_url: "http://public-api"

  # Example 5: Readonly server (filters out POST/PUT/PATCH/DELETE, annotates tools with readOnlyHint)
  readonly-api:
    openapi_url: "http://readonly-api/openapi.json"
    base_url: "http://readonly-api"
    auth:
      type: bearer
      token: "your-bearer-token-here"
    readonly: true

  # Example 6: Readonly server with overrides (include specific POST endpoints as readonly)
  search-api:
    openapi_url: "http://search-api/openapi.json"
    base_url: "http://search-api"
    auth:
      type: api_key
      header: "X-API-Key"
      value: "your-api-key-here"
    readonly: true
    readonly_overrides:
      - search_users          # by tool name / operationId
      - "POST /api/search"    # by HTTP method + path (method must be uppercase)
